<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="./images/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — Care Plus</title>
  <link rel="icon" href="./images/favicon.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eff6ff 0%, #f9fafb 60%, #fff 100%);
      display: flex;
      flex-direction: column;
    }

    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    .auth-card { width: 100%; max-width: 480px; }

    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo a {
      display: inline-flex; flex-direction: column;
      align-items: center; gap: 10px; text-decoration: none;
    }
    .auth-logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #1e40af, #1e3a8a);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 18px;
      box-shadow: 0 4px 16px rgba(30,64,175,.3);
    }
    .auth-logo-name {
      font-family: 'Poppins', sans-serif;
      font-size: 18px; font-weight: 700; color: #111827;
    }

    .auth-card-body {
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      padding: 36px 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,.07);
    }
    .auth-card-body h1 { font-size:24px; font-weight:700; text-align:center; margin-bottom:6px; }
    .auth-subtitle { text-align:center; color:#6b7280; font-size:14px; margin-bottom:28px; }

    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

    .form-group { margin-bottom:16px; }
    label { font-size:13px; font-weight:600; color:#111827; display:block; margin-bottom:6px; }

    .input-wrap { position:relative; }
    .input-icon-left {
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      color:#9ca3af; font-size:14px; pointer-events:none;
    }
    .input-toggle-pw {
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      color:#9ca3af; font-size:14px; cursor:pointer;
      background:none; border:none; padding:4px;
      display:flex; align-items:center;
      transition:color .15s;
    }
    .input-toggle-pw:hover { color:#374151; }

    .form-input {
      width:100%; padding:10px 14px 10px 38px;
      border:1.5px solid #e5e7eb; border-radius:8px;
      font-size:14px; font-family:inherit; color:#111827;
      background:#fff; transition:border-color .15s, box-shadow .15s;
      line-height:1.5;
    }
    .form-input:focus {
      outline:none; border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,.15);
    }
    .form-input::placeholder { color:#9ca3af; }
    .form-input.pw-input { padding-right:38px; }

    .terms-row {
      display:flex; align-items:flex-start; gap:10px;
      margin-bottom:22px;
    }
    .terms-row input[type="checkbox"] { margin-top:3px; cursor:pointer; accent-color:#1e40af; }
    .terms-row label { font-size:13px; color:#6b7280; font-weight:400; margin:0; cursor:pointer; }
    .terms-row a { color:#1e40af; text-decoration:none; font-weight:500; }
    .terms-row a:hover { text-decoration:underline; }

    .btn-submit {
      width:100%; padding:12px; background:#1e40af; color:#fff; border:none;
      border-radius:8px; font-weight:700; font-size:15px;
      cursor:pointer; transition:all .15s ease; font-family:inherit;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-submit:hover {
      background:#1e3a8a;
      transform:translateY(-1px); box-shadow:0 4px 14px rgba(30,64,175,.35);
    }

    .auth-footer {
      text-align:center; margin-top:22px; color:#6b7280; font-size:14px;
      display:flex; align-items:center; justify-content:center; gap:4px;
    }
    .auth-footer a { color:#1e40af; font-weight:600; text-decoration:none; }
    .auth-footer a:hover { text-decoration:underline; }

    .page-footer { padding:16px; text-align:center; font-size:12px; color:#9ca3af; }
    .page-footer a { color:#6b7280; text-decoration:none; }

    @media (max-width:520px) {
      .form-row { grid-template-columns:1fr; }
      .auth-card-body { padding:28px 20px; }
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <a href="./index.html">
          <div class="auth-logo-icon">CP</div>
          <span class="auth-logo-name">Care Plus</span>
        </a>
      </div>

      <!-- Card -->
      <div class="auth-card-body">

        <h1>Crie sua conta</h1>
        <p class="auth-subtitle">Comece a cuidar da sua saúde hoje</p>

        <form id="registroForm" novalidate>

          <!-- Nome / Email -->
          <div class="form-row">
            <div class="form-group">
              <label for="name">Nome Completo</label>
              <div class="input-wrap">
                <i class="fas fa-user input-icon-left"></i>
                <input type="text" id="name" name="name"
                  class="form-input" placeholder="João Silva"
                  autocomplete="name" required>
              </div>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <div class="input-wrap">
                <i class="fas fa-envelope input-icon-left"></i>
                <input type="email" id="email" name="email"
                  class="form-input" placeholder="seu@email.com"
                  autocomplete="email" required>
              </div>
            </div>
          </div>

          <!-- Telefone -->
          <div class="form-group">
            <label for="phone">Telefone</label>
            <div class="input-wrap">
              <i class="fas fa-phone input-icon-left"></i>
              <input type="tel" id="phone" name="phone"
                class="form-input" placeholder="(11) 99999-9999"
                autocomplete="tel">
            </div>
          </div>

          <!-- Senha / Confirmar -->
          <div class="form-row">
            <div class="form-group">
              <label for="password">Senha</label>
              <div class="input-wrap">
                <i class="fas fa-lock input-icon-left"></i>
                <input type="password" id="password" name="password"
                  class="form-input pw-input" placeholder="Mín. 8 caracteres"
                  autocomplete="new-password" required>
                <button type="button" class="input-toggle-pw" data-target="password">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirmar Senha</label>
              <div class="input-wrap">
                <i class="fas fa-lock input-icon-left"></i>
                <input type="password" id="confirmPassword" name="confirmPassword"
                  class="form-input pw-input" placeholder="Repita a senha"
                  autocomplete="new-password" required>
                <button type="button" class="input-toggle-pw" data-target="confirmPassword">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Termos -->
          <div class="terms-row">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">
              Concordo com os
              <a href="#">Termos de Serviço</a> e a
              <a href="#">Política de Privacidade</a>
            </label>
          </div>

          <button type="submit" class="btn-submit">
            <i class="fas fa-user-plus"></i>
            Criar Conta
          </button>

        </form>

        <div class="auth-footer">
          <span>Já tem uma conta?</span>
          <a href="./login.html">Entrar</a>
        </div>

      </div>
    </div>
  </div>

  <footer class="page-footer">
    <a href="./index.html">Care Plus</a> &nbsp;·&nbsp;
    <a href="#">Privacidade</a> &nbsp;·&nbsp;
    <a href="#">Termos</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
