<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Care Plus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .registro-container {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .registro-card {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      padding: 32px;
    }

    .registro-header {
      position: absolute;
      top: 32px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
      transition: opacity 0.15s ease;
    }

    .registro-header:hover {
      opacity: 0.8;
    }

    .registro-header-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #1e40af, #1e3a8a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .registro-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
    }

    .registro-subtitle {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 32px;
    }

    .terms-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 24px;
    }

    .terms-checkbox input {
      margin-top: 4px;
      cursor: pointer;
    }

    .terms-checkbox label {
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      margin: 0;
    }

    .terms-checkbox a {
      color: var(--primary);
      text-decoration: none;
    }

    .terms-checkbox a:hover {
      color: var(--primary-dark);
    }

    .login-link {
      text-align: center;
      margin-top: 24px;
      color: var(--text-secondary);
    }

    .login-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      color: var(--primary-dark);
    }
  </style>
</head>

<body>
  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">

    <div class="w-100" style="max-width: 480px;">

      <!-- LOGO -->
      <div class="text-center mb-4">

        <a href="index.html" class="d-inline-flex flex-column align-items-center text-decoration-none">

          <div class="bg-primary text-white rounded-3 d-flex align-items-center justify-content-center shadow-sm mb-2"
            style="width: 60px; height: 60px; font-weight: bold; font-size: 20px;">
            CP
          </div>

          <span class="fw-bold fs-5 text-dark">
            Care Plus
          </span>

        </a>

      </div>

      <!-- REGISTRO CARD -->
      <div class="card border-0 shadow-sm rounded-4 p-4">

        <h1 class="fw-bold text-center mb-2">
          Crie sua conta
        </h1>

        <p class="text-muted text-center mb-4">
          Comece a cuidar da sua saúde hoje
        </p>

        <!-- FORM -->
        <form id="registroForm">

          <!-- NOME -->
          <div class="mb-3">

            <label for="name" class="form-label">
              Nome Completo
            </label>

            <div class="position-relative">

              <i class="fas fa-user position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

              <input type="text" id="name" name="name" class="form-control ps-5 rounded-3" placeholder="João Silva"
                required>

            </div>

          </div>

          <!-- EMAIL -->
          <div class="mb-3">

            <label for="email" class="form-label">
              Email
            </label>

            <div class="position-relative">

              <i class="fas fa-envelope position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

              <input type="email" id="email" name="email" class="form-control ps-5 rounded-3"
                placeholder="seu@email.com" required>

            </div>

          </div>

          <!-- TELEFONE -->
          <div class="mb-3">

            <label for="phone" class="form-label">
              Telefone
            </label>

            <div class="position-relative">

              <i class="fas fa-phone position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

              <input type="tel" id="phone" name="phone" class="form-control ps-5 rounded-3"
                placeholder="(11) 99999-9999">

            </div>

          </div>

          <!-- SENHA -->
          <div class="mb-3">

            <label for="password" class="form-label">
              Senha
            </label>

            <div class="position-relative">

              <i class="fas fa-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

              <input type="password" id="password" name="password" class="form-control ps-5 rounded-3"
                placeholder="••••••••" required>

            </div>

          </div>

          <!-- CONFIRMAR SENHA -->
          <div class="mb-3">

            <label for="confirmPassword" class="form-label">
              Confirmar Senha
            </label>

            <div class="position-relative">

              <i class="fas fa-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

              <input type="password" id="confirmPassword" name="confirmPassword" class="form-control ps-5 rounded-3"
                placeholder="••••••••" required>

            </div>

          </div>

          <!-- TERMS -->
          <div class="form-check mb-4">

            <input class="form-check-input" type="checkbox" id="terms" required>

            <label class="form-check-label small text-muted" for="terms">

              Concordo com os
              <a href="#" class="text-decoration-none">Termos de Serviço</a>
              e
              <a href="#" class="text-decoration-none">Política de Privacidade</a>

            </label>

          </div>

          <!-- BUTTON -->
          <button type="submit" class="btn btn-primary w-100 rounded-3 py-2 fw-semibold">

            Criar Conta

          </button>

        </form>

        <!-- LOGIN -->
        <div class="d-flex justify-content-center text-muted small">

          <p>Já tem uma conta?</p>
          <a href="./login.html" class="text-primary text-decoration-none fw-semibold">
            Entrar
          </a>

        </div>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
