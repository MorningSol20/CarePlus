<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Care Plus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      padding: 32px;
    }

    .login-header {
      position: absolute;
      top: 32px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
      transition: opacity 0.15s ease;
    }

    .login-header:hover {
      opacity: 0.8;
    }

    .login-header-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #1e40af, #1e3a8a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .login-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-subtitle {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 32px;
    }

    .form-divider {
      position: relative;
      margin: 24px 0;
      text-align: center;
    }

    .form-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background-color: var(--border-color);
    }

    .form-divider span {
      position: relative;
      background: white;
      padding: 0 8px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .social-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .social-btn {
      border: 1px solid var(--border-color);
      background: white;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
    }

    .social-btn:hover {
      background-color: #f9fafb;
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      color: var(--text-secondary);
    }

    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      color: var(--primary-dark);
    }

    .footer-text {
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 32px;
    }

    .footer-text a {
      color: var(--primary);
      text-decoration: none;
    }

    .footer-text a:hover {
      color: var(--primary-dark);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Logo -->
    <a href="index.html" class="login-header">
      <div class="login-header-icon">CP</div>
      <span style="font-weight: bold; font-size: 16px;">Care Plus</span>
    </a>

    <!-- Login Card -->
    <div class="login-card">
      <h1 class="login-title">Bem-vindo de volta</h1>
      <p class="login-subtitle">Entre com sua conta para continuar</p>

      <!-- Login Form -->
      <form id="loginForm">
        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <div class="form-input-wrapper">
            <i class="fas fa-envelope form-input-icon"></i>
            <input type="email" id="email" class="form-control with-icon" placeholder="seu@email.com" required>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <label for="password" class="form-label" style="margin: 0;">Senha</label>
            <a href="#" style="font-size: 12px; color: var(--primary); text-decoration: none;">Esqueceu?</a>
          </div>
          <div class="form-input-wrapper">
            <i class="fas fa-lock form-input-icon"></i>
            <input type="password" id="password" class="form-control with-icon" placeholder="••••••••" required>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary w-100" style="height: 48px; font-weight: 600; margin-top: 8px;">
          Entrar
        </button>
      </form>

      <!-- Divider -->
      <div class="form-divider">
        <span>Ou continue com</span>
      </div>

      <!-- Social Login -->
      <div class="social-buttons">
        <button class="social-btn">
          <i class="fab fa-google"></i>
          <span class="d-none d-sm-inline">Google</span>
        </button>
        <button class="social-btn">
          <i class="fab fa-apple"></i>
          <span class="d-none d-sm-inline">Apple</span>
        </button>
      </div>

      <!-- Sign Up Link -->
      <div class="signup-link">
        Não tem uma conta? <a href="registro.html">Criar conta</a>
      </div>
    </div>

    <!-- Footer Text -->
    <div class="footer-text" style="position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px;">
      Ao entrar, você concorda com nossos
      <a href="#">Termos de Serviço</a> e
      <a href="#">Política de Privacidade</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
