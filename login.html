<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="./images/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Care Plus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      padding: 32px;
    }

    .login-header {
      position: absolute;
      top: 32px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
      transition: opacity 0.15s ease;
    }

    .login-header:hover {
      opacity: 0.8;
    }

    .login-header-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #1e40af, #1e3a8a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .login-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-subtitle {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 32px;
    }

    .form-divider {
      position: relative;
      margin: 24px 0;
      text-align: center;
    }

    .form-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background-color: var(--border-color);
    }

    .form-divider span {
      position: relative;
      background: white;
      padding: 0 8px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .social-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .social-btn {
      border: 1px solid var(--border-color);
      background: white;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
    }

    .social-btn:hover {
      background-color: #f9fafb;
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      color: var(--text-secondary);
    }

    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      color: var(--primary-dark);
    }

    .footer-text {
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 32px;
    }

    .footer-text a {
      color: var(--primary);
      text-decoration: none;
    }

    .footer-text a:hover {
      color: var(--primary-dark);
    }
  </style>
</head>

<body>
  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">

    <div class="w-100" style="max-width: 420px;">

      <!-- LOGO -->
      <div class="text-center mb-4">

        <a href="./index.html" class="d-inline-flex flex-column align-items-center text-decoration-none">

          <div class="bg-primary text-white rounded-3 d-flex align-items-center justify-content-center shadow-sm mb-2"
            style="width: 60px; height: 60px; font-weight: bold; font-size: 20px;">
            CP
          </div>

          <span class="fw-bold fs-5 text-dark">
            Care Plus
          </span>

        </a>

      </div>

      <!-- LOGIN CARD -->
      <div class="card border-0 shadow-sm rounded-4 p-4">

        <h1 class="fw-bold text-center mb-2">
          Bem-vindo de volta
        </h1>

        <p class="text-muted text-center mb-4">
          Entre com sua conta para continuar
        </p>

        <!-- FORM -->
        <form id="loginForm">

          <!-- EMAIL -->
          <div class="mb-3">

            <label for="email" class="form-label">
              Email
            </label>

            <div class="position-relative">

              <i class="fas fa-envelope position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

              <input type="email" id="email" class="form-control ps-5 rounded-3" placeholder="seu@email.com" required>

            </div>

          </div>

          <!-- SENHA -->
          <div class="mb-3">

            <div class="d-flex justify-content-between align-items-center mb-2">

              <label for="password" class="form-label mb-0">
                Senha
              </label>

              <a href="#" class="small text-primary text-decoration-none">
                Esqueceu?
              </a>

            </div>

            <div class="position-relative">

              <i class="fas fa-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

              <input type="password" id="password" class="form-control ps-5 rounded-3" placeholder="••••••••" required>

            </div>

          </div>

          <!-- BUTTON -->
          <button type="submit" class="btn btn-primary w-100 rounded-3 py-2 fw-semibold mt-2">

            Entrar

          </button>

        </form>

        <!-- SIGNUP -->
        <div class="d-flex justify-content-center text-muted small">

          <p>Não tem uma conta?</p>
          <a href="./registro.html" class="text-primary text-decoration-none fw-semibold">
            Criar conta
          </a>

        </div>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
