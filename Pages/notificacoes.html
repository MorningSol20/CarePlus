<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../images/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notificações - Care Plus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body data-page="notificacoes">
  <div class="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar mobile-hidden">
    <div class="sidebar-header">
      <div class="sidebar-logo">CP</div>
      <div class="sidebar-info">
        <div class="sidebar-title">Care Plus</div>
        <div class="sidebar-subtitle">Saúde em Primeiro Lugar</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="../dashboard.html" class="nav-item">
        <i class="fas fa-home"></i>
        <span class="nav-item-label">Início</span>
      </a>
      <a href="../Pages/notificacoes.html" class="nav-item active">
        <i class="fas fa-bell"></i>
        <span class="nav-item-label">Notificações</span>
      </a>
      <a href="../Pages/configuracoes.html" class="nav-item">
        <i class="fas fa-cog"></i>
        <span class="nav-item-label">Configurações</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="../index.html" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Sair</span>
      </a>
    </div>
  </aside>

  <!-- Main Wrapper (Contém Topbar e Content) -->
  <div class="main-wrapper">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <!-- Botão de Controle Único -->
        <button class="toggle-btn">
          <i class="fas fa-bars"></i>
        </button>
      </div>
      <div class="topbar-right">
        <a href="./notificacoes.html" class="notification-btn" title="Notificações">
          <i class="fas fa-bell"></i> <span class="notification-badge"></span>
        </a>
        <a href="./configuracoes.html" class="notification-btn" title="Configurações">
          <i class="fas fa-cog"></i>
        </a>
        <div class="user-avatar">JD</div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3 mb-4">
        <div>
          <h1 class="h2 h-md-1 mb-1">Notificações</h1>
          <p class="text-muted mb-0">Fique atualizado sobre sua saúde</p>
        </div>

        <button class="btn btn-outline-primary btn-sm btn-md-normal px-3 px-md-4 py-2">Marcar todas como lidas</button>
      </div>

      <!-- Notifications List -->
      <div class="d-flex flex-column gap-3">
        <!-- Empty State -->
        <div class="card border-0 shadow-sm rounded-4 py-5 px-4 mt-3 bg-white empty-state">
          <div class="d-flex flex-column align-items-center justify-content-center text-center w-100 mx-auto">
            <div class="bg-primary bg-opacity-10 rounded-circle p-4 mb-4">
              <img src="../images/empty_file.png" alt="Notificações" style="width: 70px;">
            </div>
            <h4 class="fw-semibold mb-2">
              Nenhuma notificação disponível
            </h4>
            <p class="text-muted mb-4 col-lg-6">
              Quando houver notificações, elas aparecerão aqui.
            </p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>

</html>
